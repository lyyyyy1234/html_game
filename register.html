<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body{
            background-image: url("https://i.pinimg.com/originals/98/58/8c/98588c87421b88b98dab2f2d2af44cf0.gif");
            background-size: cover;
            background-repeat: no-repeat;
            background-position:center
        }
        
    </style>
    <style>
        
        .container{
            width: 300px;
            margin: 15% auto;
            padding: 20px;
            background-color: #ffffff;
            border: 5px double #ffffff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            background-image: ;
        }
        div input{
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
       body{
    padding: 0;
    margin: 0;
     background-repeat: no-repeat;
     background-size: cover;
     border-style: none;
     background-position: 5%;
     background-color: rgba(170, 252, 129, 0.722);

}
 

    </style>

    <div class="container">
        <h1>register</h1>
        <label for="username">Username:</label>
        <br>
        <input type="text" id="username" name="username" placeholder="eg abcadmin">
        <br>
        <label for="password">Password:</label>
        <br>
        <input type="password" id="password" oninput="checkpasswords()" name="password" placeholder="eg abc123">
        <br>
        <label for="confirm_password">Confirm Password:</label>
        <br>
        <input type="password" id="confirm_password" oninput="checkpasswords()" name="confirm_password" >
        <br>
        <p id="message"></p>

        <button type="button">register</button>
        <br>
        <a href="login.html"> already have an account? click me to login</a>
    </div>

    <script>
        const button=document.querySelector("button");
        button.addEventListener("click",()=>{
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm_password").value;
            if(password !== confirmPassword){
                alert("Passwords do not match. Please try again.");
                return;
            }
            // Here you can add code to save the new user's credentials
            localStorage.setItem("username", username);
            localStorage.setItem("password", password);

            alert("Registration successful! You can now log in.");
            window.location.href='login.html';
        });

        function checkpasswords(){
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm_password").value;
            const message = document.getElementById("message");

            if(password == confirmPassword){
                message.style.color = "green";
                message.textContent = "Passwords match";
            } else {
                message.style.color = "red";
                message.textContent = "Passwords do not match";
            }
        }
    </script>
    
</body>
</html>
